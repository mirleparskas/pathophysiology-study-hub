<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Anki Review | Modules 7–10</title>
<style>:root{--ink:#182533;--muted:#62717e;--paper:#eef3f4;--card:#fff;--accent:#2b5f78;--accent2:#b55b35;--line:#d4dfe3;--good:#25734d}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:16px/1.55 system-ui,-apple-system,Segoe UI,sans-serif}header{background:linear-gradient(135deg,#1b394a,#2b5f78);color:#fff;padding:44px 22px}.wrap{max-width:980px;margin:auto}h1{font-size:clamp(2rem,5vw,3.4rem);line-height:1.05;margin:.2rem 0}.eyebrow{text-transform:uppercase;letter-spacing:.14em;font-weight:800;color:#c3e6f3}nav{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:3}nav .wrap{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px}nav a{color:var(--accent);font-weight:750;text-decoration:none;padding:6px 9px}main{max-width:980px;margin:auto;padding:22px}.panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;align-items:end}.controls label{font-weight:700}.controls select,.controls input,.controls button{width:100%;display:block;margin-top:4px;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff;font:inherit}.controls button{background:var(--accent);color:#fff;font-weight:750;cursor:pointer}.progress{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.pill{background:#e6eff2;padding:6px 10px;border-radius:999px}.flashcard{min-height:330px;display:flex;flex-direction:column;justify-content:center;text-align:center;border:2px solid var(--accent);border-radius:18px;padding:32px;background:linear-gradient(160deg,#fff,#f6fbfc);cursor:pointer;box-shadow:0 15px 35px #183c4c15}.label{font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:850}.content{font-size:clamp(1.25rem,3vw,1.9rem);white-space:pre-line;margin:18px auto;max-width:760px}.answer{display:none;border-top:1px solid var(--line);padding-top:18px;color:#183d32}.revealed .answer{display:block}.hint{color:var(--muted);font-size:.9rem}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}.actions button{border:0;border-radius:8px;padding:11px;color:#fff;font-weight:800;cursor:pointer}.again{background:#a33b35}.hard{background:#b46b28}.good{background:#25734d}.easy{background:#28619a}.source{font-size:.88rem;color:var(--muted);margin-top:12px}.empty{text-align:center;padding:40px;color:var(--muted)}@media(max-width:620px){main{padding:12px}.actions{grid-template-columns:1fr 1fr}.flashcard{padding:20px;min-height:300px}}</style></head>
<body><header><div class="wrap"><p class="eyebrow">Pathophysiology Study Hub</p><h1>Anki Review: Modules 7–10</h1><p>759 imported Basic and Cloze cards with module filtering, search, randomized order, and self-rated review.</p></div></header>
<nav><div class="wrap"><a href="index.html">Hub</a><a href="Exam_Notes_and_Practice_Bank.html">Exam Question Bank</a><a href="Module_07_Study_Hub.html">Module 7</a><a href="Module_08_Study_Hub.html">Module 8</a><a href="Module_09_Study_Hub.html">Module 9</a><a href="Module_10_Study_Hub.html">Module 10</a></div></nav>
<main><section class="panel"><div class="controls"><label>Module<select id="module"><option value="all">All Modules</option><option value="7">Module 7</option><option value="8">Module 8</option><option value="9">Module 9</option><option value="10">Module 10</option></select></label><label>Card type<select id="kind"><option value="all">Basic + Cloze</option><option>Basic</option><option>Cloze</option></select></label><label>Search<input id="search" placeholder="e.g., SIADH, stroke, gout"></label><button id="shuffle">Shuffle / restart</button></div><div class="progress"><span class="pill" id="position"></span><span class="pill" id="counts"></span><span class="pill" id="ratings"></span></div></section>
<section id="review"><div id="card" class="flashcard" role="button" tabindex="0"><div class="label" id="label"></div><div class="content" id="front"></div><div class="answer"><div class="label">Answer</div><div class="content" id="back"></div><div class="source" id="source"></div></div><div class="hint">Click the card or press Space to reveal the answer</div></div><div class="actions"><button class="again" data-rating="Again">Again</button><button class="hard" data-rating="Hard">Hard</button><button class="good" data-rating="Good">Good</button><button class="easy" data-rating="Easy">Easy</button></div></section></main>
<script src="Imported_Anki_Notes.js"></script><script>
const all=window.importedAnkiCards||[];let deck=[],index=0,stats={Again:0,Hard:0,Good:0,Easy:0};const el=id=>document.getElementById(id);function shuffle(a){a=[...a];for(let i=a.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function filtered(){let q=el('search').value.trim().toLowerCase();return all.filter(c=>(el('module').value==='all'||String(c.module)===el('module').value)&&(el('kind').value==='all'||c.kind===el('kind').value)&&(!q||(c.front+' '+c.back+' '+c.tags.join(' ')).toLowerCase().includes(q)))}function restart(){deck=shuffle(filtered());index=0;stats={Again:0,Hard:0,Good:0,Easy:0};render()}function render(){let c=deck[index];el('counts').textContent=`${deck.length} cards in this deck`;el('ratings').textContent=`Again ${stats.Again} · Hard ${stats.Hard} · Good ${stats.Good} · Easy ${stats.Easy}`;if(!c){el('position').textContent='No matching cards';el('review').innerHTML='<div class="panel empty">No cards match these filters.</div>';return}el('position').textContent=`Card ${index+1} of ${deck.length}`;el('label').textContent=`Module ${c.module} · ${c.kind}`;el('front').textContent=c.front;el('back').textContent=c.back;el('source').textContent=`Imported Anki note ${c.noteId}${c.tags.length?' · '+c.tags.join(' · '):''}`;el('card').classList.remove('revealed')}function reveal(){el('card').classList.add('revealed')}el('card').onclick=reveal;el('card').onkeydown=e=>{if(e.code==='Space'||e.key==='Enter'){e.preventDefault();reveal()}};document.querySelectorAll('[data-rating]').forEach(b=>b.onclick=()=>{if(!el('card').classList.contains('revealed')){reveal();return}stats[b.dataset.rating]++;index=(index+1)%deck.length;render()});el('shuffle').onclick=restart;el('module').onchange=restart;el('kind').onchange=restart;let timer;el('search').oninput=()=>{clearTimeout(timer);timer=setTimeout(restart,200)};restart();
</script></body></html>
